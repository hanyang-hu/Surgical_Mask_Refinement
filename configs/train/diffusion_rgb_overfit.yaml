# RGB-Conditioned Latent Diffusion Overfit Configuration
# Small-scale training for overfitting sanity checks

# Training hyperparameters
train:
  epochs: 100
  batch_size: 16
  num_workers: 4
  learning_rate: 1.0e-4
  weight_decay: 0.0
  grad_clip_norm: 1.0
  log_every_n_steps: 10  # More frequent logging for overfit
  mixed_precision: false
  seed: 42

# Optimizer configuration
optimizer:
  type: "adamw"  # 'adam' or 'adamw'
  betas: [0.9, 0.999]
  eps: 1.0e-8

# Learning rate scheduler (optional)
scheduler:
  use_scheduler: false
  type: "cosine"  # 'cosine' or 'step'
  eta_min: 0.0
  step_size: 20
  gamma: 0.1

# Dataset configuration
data:
  metadata_dir: "data/metadata"
  token_dir: "outputs/clip_tokens"  # Precomputed CLIP tokens
  split_train: "train"
  split_val: "val"
  source: "all"  # 'all', 'real_world', or 'synthetic'
  image_size: 512
  augment_train: false
  strict_tokens: true  # Raise error if tokens missing

# Frozen VAE configuration
vae:
  model_config: "configs/model/vae.yaml"
  checkpoint: "outputs/vae/checkpoints/best.pt"
  use_mu_only: true  # Deterministic encoding (z = mu)
  freeze: true       # Keep VAE frozen (must be true)

# RGB conditioning configuration
rgb_condition:
  token_dim: 768          # CLIP ViT-B/16 hidden dimension
  projected_dim: 256      # Projected dimension for cross-attention
  num_heads: 4           # Number of attention heads
  load_spatial_map: false  # Load spatial feature maps if available

# Checkpoint configuration
checkpoint:
  output_dir: "outputs/diffusion_rgb_overfit"  # Separate output dir
  save_best: true
  save_latest: true
  save_every_n_epochs: 10  # Frequent checkpoints for overfit
  save_epoch_checkpoints: true
  monitor: "val/loss"
  mode: "min"  # 'min' or 'max'

# Evaluation configuration
eval:
  eval_every_n_epochs: 10  # Frequent evaluation for overfit
  num_visualizations: 8
  save_visualizations: true

# Weights & Biases logging
wandb:
  use_wandb: true
  project: "surgical-rgb-conditioned-diffusion"
  run_name: null  # Set via CLI or leave as null for auto-generated name
  mode: "online"  # 'online', 'offline', or 'disabled'
  tags: ["overfit", "rgb-conditioned", "step12"]
  
# Auxiliary losses
auxiliary_losses:
  use_perceptual_loss: false  # Enable perceptual loss
  tooltip_loss_weight: 0.05  # Weight for ToolTipNet perceptual loss
  sold2_loss_weight: 0.05  # Weight for SOLD2 perceptual loss
